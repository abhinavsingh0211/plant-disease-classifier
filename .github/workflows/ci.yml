name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  syntax:
    name: Compile & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Byte-compile everything as a fast, dependency-free syntax gate.
      - name: Compile sources
        run: python -m compileall -q src app

      # Lightweight style/lint check (non-blocking on style-only issues).
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src app --select E9,F63,F7,F82 --output-format=github
